services:
  orthanc:
    image: orthancteam/orthanc:latest
    platform: linux/amd64
    container_name: ambientct-orthanc
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042"
      - "${ORTHANC_DICOM_PORT:-4242}:4242"
    environment:
      ORTHANC__NAME: "AmbientCT"
      ORTHANC__AUTHENTICATION_ENABLED: "true"
      ORTHANC__REGISTERED_USERS: '{"${ORTHANC_USER:-admin}": "${ORTHANC_PASSWORD:-changeme-on-first-run}"}'
      DICOM_WEB_PLUGIN_ENABLED: "true"
      OHIF_PLUGIN_ENABLED: "true"
      ORTHANC__OVERWRITE_INSTANCES: "true"
      ORTHANC_USER: "${ORTHANC_USER:-admin}"
      ORTHANC_PASSWORD: "${ORTHANC_PASSWORD:-changeme-on-first-run}"
    volumes:
      - orthanc-db:/var/lib/orthanc/db
    networks:
      - pacs-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,base64,os;u=os.environ['ORTHANC_USER'];p=os.environ['ORTHANC_PASSWORD'];urllib.request.urlopen(urllib.request.Request('http://localhost:8042/system',headers={'Authorization':'Basic '+base64.b64encode((u+':'+p).encode()).decode()}))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  viewer:
    image: ohif/app:v3.9.2
    platform: linux/amd64
    container_name: ambientct-viewer
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    ports:
      - "${VIEWER_PORT:-3000}:80"
    depends_on:
      orthanc:
        condition: service_healthy
    networks:
      - pacs-net

volumes:
  orthanc-db:

networks:
  pacs-net:
