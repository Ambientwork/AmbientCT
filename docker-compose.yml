services:
  orthanc:
    image: orthancteam/orthanc:26.1.0
    platform: linux/amd64
    container_name: ambientct-orthanc
    restart: unless-stopped
    mem_limit: ${ORTHANC_MEM_LIMIT:-512m}
    cpus: ${ORTHANC_CPUS:-1.0}
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042"
      - "${ORTHANC_DICOM_PORT:-4242}:4242"
    environment:
      ORTHANC__NAME: "${ORTHANC_INSTANCE_NAME:-AmbientCT}"
      ORTHANC__AUTHENTICATION_ENABLED: "true"
      ORTHANC__REGISTERED_USERS: '{"${ORTHANC_USER:-admin}": "${ORTHANC_PASSWORD:?ORTHANC_PASSWORD must be set in .env}"}'
      ORTHANC__DICOM_AET: "${DICOM_AE_TITLE:-DENTALPACS}"
      ORTHANC__DICOM_CHECK_CALLED_AET: "false"
      ORTHANC__DICOM_CHECK_MODALITY_HOST: "false"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      OHIF_PLUGIN_ENABLED: "true"
      ORTHANC__OVERWRITE_INSTANCES: "${ORTHANC_OVERWRITE_INSTANCES:-true}"
      ORTHANC__STABLE_AGE: "${ORTHANC_STABLE_AGE:-60}"
      ORTHANC__LIMIT_FIND_RESULTS: "${ORTHANC_LIMIT_FIND_RESULTS:-100}"
      ORTHANC__LIMIT_FIND_INSTANCES: "${ORTHANC_LIMIT_FIND_INSTANCES:-100}"
      ORTHANC__HTTP_THREADS_COUNT: "${ORTHANC_HTTP_THREADS:-10}"
      ORTHANC_USER: "${ORTHANC_USER:-admin}"
      ORTHANC_PASSWORD: "${ORTHANC_PASSWORD:?ORTHANC_PASSWORD must be set in .env}"
    volumes:
      - orthanc-db:/var/lib/orthanc/db
      - ./config/orthanc.json:/etc/orthanc/orthanc.json:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /var/run:noexec,nosuid,size=1m
    networks:
      - pacs-net
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request as r; import os; u=os.environ.get('ORTHANC_USER','admin'); p=os.environ.get('ORTHANC_PASSWORD',''); r.urlopen(r.Request('http://localhost:8042/system', headers={'Authorization':'Basic '+__import__('base64').b64encode(f'{u}:{p}'.encode()).decode()}))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # viewer: AmbientCT OHIF built from source with dental extensions.
  # First build: docker compose build viewer  (~10-15 min)
  # Then start:  docker compose up -d
  # ---------------------------------------------------------------------------
  viewer:
    image: ambientct/ohif:latest
    build:
      context: .
      dockerfile: Dockerfile.ohif
    platform: linux/amd64
    container_name: ambientct-viewer
    restart: unless-stopped
    mem_limit: ${VIEWER_MEM_LIMIT:-512m}
    cpus: ${VIEWER_CPUS:-1.0}
    # Inject Orthanc credentials into nginx config at startup
    entrypoint:
      - /bin/sh
      - -c
      - |
        AUTH=$$(printf '%s:%s' "$$ORTHANC_USER" "$$ORTHANC_PASSWORD" | base64 | tr -d '\n')
        sed "s|ORTHANC_AUTH_PLACEHOLDER|$$AUTH|g" /etc/nginx/ohif.conf.template > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    environment:
      ORTHANC_USER: "${ORTHANC_USER:-admin}"
      ORTHANC_PASSWORD: "${ORTHANC_PASSWORD:?ORTHANC_PASSWORD must be set in .env}"
    ports:
      - "${VIEWER_PORT:-3000}:80"
      - "${VIEWER_SSL_PORT:-3443}:443"
    depends_on:
      orthanc:
        condition: service_healthy
    volumes:
      - ./config/ohif-config.js:/usr/share/nginx/html/app-config.js:ro
      - ./config/help.html:/usr/share/nginx/html/help:ro
      - ./config/nginx/ohif.conf.template:/etc/nginx/ohif.conf.template:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
      - /var/cache/nginx:noexec,nosuid,size=32m
      - /var/run:noexec,nosuid,size=1m
    networks:
      - pacs-net
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://localhost:443/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # mar-processor: Python-Service für Metal Artifact Reduction (post-reconstruction).
  # Verarbeitet DICOM-Serien on-demand, speichert MAR-Ergebnis als neue Serie in Orthanc.
  # API: POST /api/process-mar  |  GET /api/job/{job_id}
  # ---------------------------------------------------------------------------
  mar-processor:
    build:
      context: ./mar-processor
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: ambientct-mar
    restart: unless-stopped
    mem_limit: ${MAR_MEM_LIMIT:-1g}
    cpus: ${MAR_CPUS:-2.0}
    ports:
      - "${MAR_PORT:-8000}:8000"
    environment:
      ORTHANC_URL: "http://orthanc:8042"
      ORTHANC_USER: "${ORTHANC_USER:-admin}"
      ORTHANC_PASSWORD: "${ORTHANC_PASSWORD:?ORTHANC_PASSWORD must be set in .env}"
    networks:
      - pacs-net
    depends_on:
      orthanc:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # ai-inference: FastAPI service for dental anatomy segmentation and finding
  # suggestion (Phase 3a — mock mode; real DentalSegmentator model in Phase 3b).
  #
  # Design decision — no host port mapping:
  #   The service is reachable ONLY from other containers on pacs-net.
  #   Browser requests reach it exclusively via the viewer's nginx proxy:
  #     browser → localhost:3000/api/ai/... → nginx → ai-inference:8000/api/ai/...
  #   This keeps the inference container off the public network entirely.
  #
  # Design decision — viewer depends_on NOT updated:
  #   nginx start must not block on ai-inference health. If ai-inference is
  #   slow to start (model load) the viewer should still serve the SPA. The
  #   nginx proxy_pass will return 502 until ai-inference is healthy, which is
  #   acceptable; the viewer frontend handles this gracefully via its mock adapter.
  # ---------------------------------------------------------------------------
  ai-inference:
    image: ambientct/ai-inference:latest
    build:
      context: ./ai-inference
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: ambientct-ai-inference
    restart: unless-stopped
    mem_limit: ${AI_INFERENCE_MEM_LIMIT:-2g}
    cpus: ${AI_INFERENCE_CPUS:-2.0}
    environment:
      AI_INFERENCE_PHASE: "3a-mock"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      # Phase 3b will add:
      #   ORTHANC_URL: http://orthanc:8042
      #   ORTHANC_USER / ORTHANC_PASSWORD
      #   MODEL_PATH: /models/dental-segmentator
    volumes:
      - ./data/ai-models:/models:ro
    # NO ports: mapping — service is reachable ONLY through the internal pacs-net.
    # The viewer's nginx proxies /api/ai/ to ai-inference:8000.
    networks:
      - pacs-net
    depends_on:
      orthanc:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as r; r.urlopen('http://localhost:8000/api/ai/health', timeout=3)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # viewer-stock: Pre-built OHIF image (no dental extensions).
  # Use for quick testing without a full build:
  #   docker compose up -d viewer-stock
  # ---------------------------------------------------------------------------
  viewer-stock:
    image: ohif/app:${OHIF_VERSION:-v3.9.2}
    profiles:
      - stock
    platform: linux/amd64
    container_name: ambientct-viewer-stock
    restart: unless-stopped
    mem_limit: ${VIEWER_MEM_LIMIT:-256m}
    cpus: ${VIEWER_CPUS:-0.5}
    entrypoint:
      - /bin/sh
      - -c
      - |
        AUTH=$$(printf '%s:%s' "$$ORTHANC_USER" "$$ORTHANC_PASSWORD" | base64 | tr -d '\n')
        sed "s|ORTHANC_AUTH_PLACEHOLDER|$$AUTH|g" /etc/nginx/ohif.conf.template > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    environment:
      ORTHANC_USER: "${ORTHANC_USER:-admin}"
      ORTHANC_PASSWORD: "${ORTHANC_PASSWORD:?ORTHANC_PASSWORD must be set in .env}"
    ports:
      - "${VIEWER_STOCK_PORT:-3001}:80"
    depends_on:
      orthanc:
        condition: service_healthy
    volumes:
      - ./config/ohif-config.js:/usr/share/nginx/html/app-config.js:ro
      - ./config/nginx/ohif.conf.template:/etc/nginx/ohif.conf.template:ro
    networks:
      - pacs-net
    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
