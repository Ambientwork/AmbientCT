name: Feature Request
description: Suggest a new feature for AmbientCT
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What should be built?
      placeholder: Describe the feature clearly...
    validations:
      required: true

  - type: textarea
    id: current_workflow
    attributes:
      label: Your current workflow
      placeholder: "How do you handle this today? What workaround do you use?"

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "High — need this week"
        - "Medium — need this month"
        - "Low — nice to have"

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - "OHIF Viewer (Frontend)"
        - "Orthanc (PACS Backend)"
        - "Docker / Infrastructure"
        - "Scripts / CLI"
        - "Documentation"
        - "Landing Page"

  - type: dropdown
    id: would_contribute
    attributes:
      label: Would you contribute this feature?
      options:
        - "Yes — I'll open a PR"
        - "Maybe — with guidance"
        - "No — just a suggestion"

  - type: textarea
    id: acceptance
    attributes:
      label: Done when...
      placeholder: "It is done when..."
