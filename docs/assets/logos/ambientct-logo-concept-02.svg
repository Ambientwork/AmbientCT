<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" fill="none">
  <title>AmbientCT Logo Concept 02</title>
  <desc>Modern arch-and-slice mark with AmbientCT wordmark.</desc>
  <defs>
    <linearGradient id="panel02" x1="0" y1="0" x2="1200" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="slice02" x1="128" y1="138" x2="368" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="1160" height="600" rx="40" fill="url(#panel02)"/>
  <rect x="88" y="108" width="304" height="304" rx="88" fill="#04111F"/>
  <rect x="150" y="184" width="46" height="152" rx="23" fill="url(#slice02)" opacity="0.9"/>
  <rect x="217" y="162" width="46" height="196" rx="23" fill="#7DD3FC"/>
  <rect x="284" y="184" width="46" height="152" rx="23" fill="url(#slice02)" opacity="0.9"/>

  <path
    d="M128 244
       C163 200 201 176 240 176
       C279 176 317 200 352 244"
    stroke="#F8FAFC"
    stroke-width="16"
    stroke-linecap="round"
  />
  <path
    d="M145 268
       C174 233 206 214 240 214
       C274 214 306 233 335 268"
    stroke="#0F172A"
    stroke-width="10"
    stroke-linecap="round"
    opacity="0.35"
  />
  <circle cx="240" cy="176" r="10" fill="#F8FAFC"/>
  <circle cx="150" cy="244" r="8" fill="#99F6E4"/>
  <circle cx="330" cy="244" r="8" fill="#99F6E4"/>

  <text x="470" y="248" fill="#082F49" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="120" font-weight="800" letter-spacing="-5">
    Ambient<tspan fill="#0891B2">CT</tspan>
  </text>
  <text x="472" y="320" fill="#0F766E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="3">
    ARCH . SLICES . CLARITY
  </text>
  <text x="472" y="376" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
    Open Source imaging software by Ambientwork
  </text>

  <path d="M472 424H852" stroke="#0EA5E9" stroke-width="8" stroke-linecap="round" opacity="0.18"/>
  <path d="M472 456H708" stroke="#0F172A" stroke-width="8" stroke-linecap="round" opacity="0.08"/>
</svg>
